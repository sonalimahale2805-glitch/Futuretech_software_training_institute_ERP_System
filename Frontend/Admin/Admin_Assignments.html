<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Management UI</title>
    <link rel="stylesheet" href="Admin_ASSIGNMENTS.css">
</head>
<body>

<div class="container">
    <h2 class="section-title">Assignment Management</h2>
    
    <div class="card form-card">
        <div class="row">
            <input type="text" id="title" placeholder="Assignment Title">
            <input type="date" id="date">
        </div>
        <textarea id="desc" placeholder="Instructions for students (Optional)..."></textarea>
        
        <div class="footer-row">
            <div class="file-box">
                <label>Attach Resource (Optional):</label>
                <input type="file" id="fileInput">
            </div>
            <button id="publishBtn">Publish Assignment</button>
        </div>
    </div>

    <h2 class="section-title">Student Submissions</h2>
    <div class="card table-card">
        <table>
            <thead>
                <tr>
                    <th>STUDENT NAME</th>
                    <th>ASSIGNMENT</th>
                    <th>DUE DATE</th>
                    <th>STATUS</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<script src="Admin_ASSIGNMENTS.js"></script>
</body>
</html>
